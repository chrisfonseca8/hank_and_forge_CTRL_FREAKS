<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Room</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --accent: #6c63ff;
      --accent2: #48bb78;
      --danger: #fc8181;
      --text: #e2e8f0;
      --text-dim: #718096;
      --border: #2d3748;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Lobby ────────────────────────────────────────────────── */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 2rem;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 460px;
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-size: .8rem;
    }

    .input-group { display: flex; gap: .6rem; margin-bottom: 1rem; }

    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .7rem 1rem;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--text-dim); }

    .role-select {
      display: flex;
      gap: .6rem;
      margin-bottom: 1.2rem;
    }

    .role-btn {
      flex: 1;
      padding: .7rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text-dim);
      cursor: pointer;
      font-size: .9rem;
      transition: all .2s;
    }
    .role-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(108,99,255,.15);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .75rem 1.4rem;
      border-radius: 8px;
      border: none;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--accent2); color: #fff; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.4rem 0; }

    /* ── Room UI ──────────────────────────────────────────────── */
    #room { display: none; flex-direction: column; height: 100vh; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem 1.4rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .topbar-left { display: flex; align-items: center; gap: 1rem; }
    .room-id-badge {
      font-size: .8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .3rem .8rem;
      color: var(--text-dim);
    }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #fc8181;
      transition: background .4s;
    }
    .status-dot.connected { background: var(--accent2); }

    #status-text { font-size: .85rem; color: var(--text-dim); }

    /* ── Videos ───────────────────────────────────────────────── */
    .video-area {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg);
      overflow: hidden;
    }

    @media (max-width: 700px) {
      .video-area { grid-template-columns: 1fr; }
    }

    .video-box {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-box video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror own video */
      display: block;
    }

    #remoteVideo { transform: none; } /* don't mirror remote */

    .video-label {
      position: absolute;
      bottom: .6rem; left: .8rem;
      font-size: .78rem;
      background: rgba(0,0,0,.55);
      padding: .25rem .6rem;
      border-radius: 6px;
      color: #fff;
    }

    .no-stream-msg {
      color: var(--text-dim);
      font-size: .9rem;
      text-align: center;
      padding: 1rem;
    }

    /* ── Bottom panel ─────────────────────────────────────────── */
    .bottom-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: .8rem 1.4rem;
      display: flex;
      align-items: center;
      gap: .8rem;
      flex-wrap: wrap;
    }

    .control-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
      background: var(--surface2);
      color: var(--text);
    }
    .control-btn:active { transform: scale(.9); }
    .control-btn.muted { background: var(--danger); }
    .control-btn.video-off { background: var(--danger); }

    .chat-area {
      flex: 1;
      display: flex;
      gap: .6rem;
      min-width: 200px;
    }

    .chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .5rem .9rem;
      color: var(--text);
      font-size: .9rem;
      outline: none;
    }
    .chat-input:focus { border-color: var(--accent); }

    /* ── Chat messages ────────────────────────────────────────── */
    .chat-log {
      position: fixed;
      bottom: 80px; right: 1rem;
      width: 300px;
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: .4rem;
      padding: .5rem;
      pointer-events: none;
    }

    .chat-msg {
      background: rgba(26,29,39,.9);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .4rem .8rem;
      font-size: .82rem;
      animation: fadeIn .3s ease;
    }
    .chat-msg .who { font-weight: 700; color: var(--accent); margin-right: .3rem; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity:1; transform:none; } }

    /* ── Notification toast ───────────────────────────────────── */
    #toast {
      position: fixed;
      top: 1rem; left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .6rem 1.2rem;
      font-size: .9rem;
      color: var(--text);
      z-index: 999;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ══════════════════════ LOBBY ══════════════════════ -->
<div id="lobby">
  <div class="logo">🎤 InterviewRoom</div>

  <!-- Create new room -->
  <div class="card">
    <h2>Create a New Room</h2>
    <button class="btn btn-primary" id="createRoomBtn">+ Create Interview Room</button>
    <div id="createdInfo" style="margin-top:1rem;display:none;">
      <p style="font-size:.85rem;color:var(--text-dim);margin-bottom:.4rem;">Share this link with your partner:</p>
      <div class="input-group">
        <input type="text" id="shareLink" readonly />
        <button class="btn btn-secondary" id="copyLinkBtn" style="white-space:nowrap">Copy</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Join an Existing Room</h2>
    <div class="input-group">
      <input type="text" id="roomInput" placeholder="Enter Room ID (e.g. abc12345)" maxlength="8" />
    </div>

    <div class="role-select">
      <button class="role-btn active" data-role="candidate">🎓 Candidate</button>
      <button class="role-btn"        data-role="interviewer">💼 Interviewer</button>
    </div>

    <button class="btn btn-primary" id="joinBtn">Join Room</button>
  </div>
</div>

<!-- ══════════════════════ ROOM ══════════════════════ -->
<div id="room">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo" style="font-size:1.2rem">🎤 InterviewRoom</span>
      <span class="room-id-badge" id="roomBadge">Room: —</span>
      <span class="room-id-badge" id="roleBadge">Role: —</span>
    </div>
    <div style="display:flex;align-items:center;gap:.6rem">
      <div class="status-dot" id="statusDot"></div>
      <span id="status-text">Waiting for partner…</span>
    </div>
  </div>

  <div class="video-area">
    <div class="video-box" id="localBox">
      <video id="localVideo" autoplay muted playsinline></video>
      <span class="video-label" id="localLabel">You</span>
    </div>
    <div class="video-box" id="remoteBox">
      <div class="no-stream-msg" id="noRemoteMsg">⏳ Waiting for partner to join…</div>
      <video id="remoteVideo" autoplay playsinline style="display:none"></video>
      <span class="video-label" id="remoteLabel">Partner</span>
    </div>
  </div>

  <div class="bottom-panel">
    <button class="control-btn" id="muteBtn" title="Toggle microphone">🎙️</button>
    <button class="control-btn" id="videoBtn" title="Toggle camera">📷</button>
    <button class="btn btn-danger" id="leaveBtn" style="border-radius:8px;padding:.5rem 1rem">Leave</button>
    <div class="chat-area">
      <input class="chat-input" id="chatInput" placeholder="Send a message…" />
      <button class="btn btn-secondary" id="sendChatBtn" style="white-space:nowrap">Send</button>
    </div>
  </div>
</div>

<!-- Chat messages overlay -->
<div class="chat-log" id="chatLog"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Socket.io client (served by server) -->
<script src="/socket.io/socket.io.js"></script>

<script>
// ══════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════
let socket;
let peerConnection;
let localStream;
let roomId;
let myRole = "candidate";
let audioMuted = false;
let videoOff   = false;

const ICE_SERVERS = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
  ],
};

// ══════════════════════════════════════════════════════
//  DOM refs
// ══════════════════════════════════════════════════════
const $lobby        = document.getElementById("lobby");
const $room         = document.getElementById("room");
const $localVideo   = document.getElementById("localVideo");
const $remoteVideo  = document.getElementById("remoteVideo");
const $noRemoteMsg  = document.getElementById("noRemoteMsg");
const $statusDot    = document.getElementById("statusDot");
const $statusText   = document.getElementById("status-text");
const $roomBadge    = document.getElementById("roomBadge");
const $roleBadge    = document.getElementById("roleBadge");
const $muteBtn      = document.getElementById("muteBtn");
const $videoBtn     = document.getElementById("videoBtn");
const $chatInput    = document.getElementById("chatInput");
const $chatLog      = document.getElementById("chatLog");
const $roomInput    = document.getElementById("roomInput");

// ══════════════════════════════════════════════════════
//  Lobby — role selection
// ══════════════════════════════════════════════════════
document.querySelectorAll(".role-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    myRole = btn.dataset.role;
  });
});

// ══════════════════════════════════════════════════════
//  Lobby — create room
// ══════════════════════════════════════════════════════
document.getElementById("createRoomBtn").addEventListener("click", async () => {
  const res  = await fetch("/api/rooms", { method: "POST" });
  const data = await res.json();
  const link = `${location.origin}/interview/${data.roomId}`;
  document.getElementById("createdInfo").style.display = "block";
  document.getElementById("shareLink").value = link;
  showToast(`Room ${data.roomId} created! Share the link.`);
});

document.getElementById("copyLinkBtn").addEventListener("click", () => {
  const val = document.getElementById("shareLink").value;
  navigator.clipboard.writeText(val).then(() => showToast("Link copied!"));
});

// ══════════════════════════════════════════════════════
//  Lobby — join room
// ══════════════════════════════════════════════════════
document.getElementById("joinBtn").addEventListener("click", () => {
  const id = $roomInput.value.trim();
  if (!id) return showToast("Please enter a Room ID");
  enterRoom(id, myRole);
});

// If URL is /interview/<id>, auto-fill the room ID
const urlMatch = location.pathname.match(/\/interview\/([^/]+)/);
if (urlMatch) {
  $roomInput.value = urlMatch[1];
  showToast(`Room ID "${urlMatch[1]}" pre-filled. Choose your role and join.`);
}

// ══════════════════════════════════════════════════════
//  Enter room
// ══════════════════════════════════════════════════════
async function enterRoom(id, role) {
  roomId  = id;
  myRole  = role;

  // 1. Get camera + mic
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (err) {
    showToast("❌ Camera/mic access denied. Please allow permissions.");
    return;
  }

  $localVideo.srcObject = localStream;

  // 2. Switch UI
  $lobby.style.display = "none";
  $room.style.display  = "flex";
  $roomBadge.textContent = `Room: ${roomId}`;
  $roleBadge.textContent = `Role: ${role}`;

  // 3. Connect socket
  socket = io();
  bindSocketEvents();

  // 4. Join the room
  socket.emit("join-room", { roomId, role });
}

// ══════════════════════════════════════════════════════
//  Socket events
// ══════════════════════════════════════════════════════
function bindSocketEvents() {
  socket.on("joined", ({ roomId, role }) => {
    console.log(`Joined room ${roomId} as ${role}`);
  });

  socket.on("error", ({ message }) => {
    showToast("❌ " + message);
    // Go back to lobby
    $lobby.style.display = "flex";
    $room.style.display  = "none";
    if (socket) socket.disconnect();
  });

  // ── A second user joined → start WebRTC (caller role = candidate) ──────────
  socket.on("user-joined", async ({ role }) => {
    showToast(`✅ ${role} joined the room!`);
    setStatus("connected", "Partner connected");

    // The user who was already here creates the offer
    await createPeerConnection();
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit("offer", { roomId, offer });
  });

  // ── Receive offer (you are the second user) ────────────────────────────────
  socket.on("offer", async ({ offer }) => {
    await createPeerConnection();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit("answer", { roomId, answer });
  });

  // ── Receive answer ─────────────────────────────────────────────────────────
  socket.on("answer", async ({ answer }) => {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
  });

  // ── Receive ICE candidate ──────────────────────────────────────────────────
  socket.on("ice-candidate", async ({ candidate }) => {
    try {
      await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    } catch (e) {
      console.error("ICE error", e);
    }
  });

  // ── Partner left ───────────────────────────────────────────────────────────
  socket.on("user-left", ({ role }) => {
    showToast(`⚠️ ${role} left the room.`);
    setStatus("waiting", "Waiting for partner…");
    $remoteVideo.style.display = "none";
    $noRemoteMsg.style.display = "block";
    if (peerConnection) { peerConnection.close(); peerConnection = null; }
  });

  // ── Chat ───────────────────────────────────────────────────────────────────
  socket.on("chat-message", ({ role, message, timestamp }) => {
    addChatMsg(role, message);
  });
}

// ══════════════════════════════════════════════════════
//  WebRTC peer connection
// ══════════════════════════════════════════════════════
async function createPeerConnection() {
  if (peerConnection) return; // already created

  peerConnection = new RTCPeerConnection(ICE_SERVERS);

  // Add local tracks
  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  // Receive remote stream
  peerConnection.ontrack = (event) => {
    const [remoteStream] = event.streams;
    $remoteVideo.srcObject = remoteStream;
    $remoteVideo.style.display = "block";
    $noRemoteMsg.style.display = "none";
  };

  // ICE candidates
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", { roomId, candidate: event.candidate });
    }
  };

  peerConnection.onconnectionstatechange = () => {
    const s = peerConnection.connectionState;
    console.log("Connection state:", s);
    if (s === "connected") setStatus("connected", "Live 🔴");
    if (s === "disconnected" || s === "failed") setStatus("waiting", "Connection lost");
  };
}

// ══════════════════════════════════════════════════════
//  Controls
// ══════════════════════════════════════════════════════
$muteBtn.addEventListener("click", () => {
  audioMuted = !audioMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !audioMuted);
  $muteBtn.textContent = audioMuted ? "🔇" : "🎙️";
  $muteBtn.classList.toggle("muted", audioMuted);
});

$videoBtn.addEventListener("click", () => {
  videoOff = !videoOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !videoOff);
  $videoBtn.textContent = videoOff ? "🚫" : "📷";
  $videoBtn.classList.toggle("video-off", videoOff);
});

document.getElementById("leaveBtn").addEventListener("click", () => {
  if (socket) socket.disconnect();
  if (peerConnection) peerConnection.close();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  location.href = "/";
});

// ── Chat ────────────────────────────────────────────────────────────────────
document.getElementById("sendChatBtn").addEventListener("click", sendChat);
$chatInput.addEventListener("keydown", e => { if (e.key === "Enter") sendChat(); });

function sendChat() {
  const msg = $chatInput.value.trim();
  if (!msg || !socket) return;
  socket.emit("chat-message", { roomId, message: msg });
  $chatInput.value = "";
}

function addChatMsg(role, message) {
  const div = document.createElement("div");
  div.className = "chat-msg";
  div.innerHTML = `<span class="who">${role}:</span>${escHtml(message)}`;
  $chatLog.appendChild(div);
  $chatLog.scrollTop = $chatLog.scrollHeight;
  // Auto-remove after 8s
  setTimeout(() => div.remove(), 8000);
}

// ══════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════
function setStatus(type, text) {
  $statusDot.className = "status-dot" + (type === "connected" ? " connected" : "");
  $statusText.textContent = text;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 3500);
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
